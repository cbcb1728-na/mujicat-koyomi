<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="干支変換">
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <title>Koyomi Muji</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #334155;
            --text-muted: #94a3b8;
            --input-bg: #f1f5f9;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --error: #ef4444;
            --border: #e2e8f0;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --card-bg: #1e293b;
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --input-bg: #334155;
                --accent: #60a5fa;
                --accent-hover: #3b82f6;
                --border: #334155;
            }
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            letter-spacing: 0.03em;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 35px 25px;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.15);
            box-sizing: border-box;
            transition: background-color 0.3s;
        }

        h1 {
            font-size: 1.00rem;
            text-align: center;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 30px;
            color: var(--text-main);
        }
        
        .converter-section {
            margin-bottom: 35px;
            padding-bottom: 25px;
            border-bottom: 1px dashed var(--border);
        }
        .converter-section:last-of-type {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        h2 {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: 500;
        }

        .input-group {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .input-group span {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-main);
            white-space: nowrap;
        }

        input[type="number"], input[type="text"] {
            flex: 1;
            min-width: 0;
            padding: 12px 10px;
            font-size: 0.9rem;
            border: 2px solid transparent;
            border-radius: 12px;
            background-color: var(--input-bg);
            color: var(--text-main);
            transition: all 0.2s ease;
            box-sizing: border-box;
            text-align: center;
        }
        
        input:focus {
            outline: none;
            border-color: var(--accent);
            background-color: var(--card-bg);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        .result-wrapper {
            display: none;
            margin-top: 15px;
            padding: 16px;
            background-color: var(--input-bg);
            border-radius: 12px;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-text {
            font-size: 0.90rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .result-diff {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .copy-btn {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 8px 16px;
            font-size: 0.8rem;
            font-weight: 600;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .copy-btn:hover {
            background-color: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        
        .error-msg {
            color: var(--error);
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
        }

        .note {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 20px;
            line-height: 1.6;
            text-align: left;
            padding: 12px 16px; /* 上下・左右に少し余白を作る */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>暦 おおざっぱ変換</h1>

        <div class="converter-section">
            <h2>西暦 から 和暦 へ</h2>
            <div class="input-group">
                <input type="number" id="seirekiInput" placeholder="例: 2026" style="text-align: left; padding-left: 14px;">
                <span>年</span>
            </div>
            <div id="wError" class="error-msg">※大化（645年）以前は未対応です。</div>
            <div id="warekiResult" class="result-wrapper">
                <div id="wText" class="result-text"></div>
                <div id="wDiff" class="result-diff"></div>
                <button id="wCopyBtn" class="copy-btn" onclick="copyFormatResult(this)">数値コピー</button>
            </div>
        </div>

        <div class="converter-section">
            <h2>和暦 から 西暦 へ</h2>
            <div class="input-group">
                <input type="text" id="gengoInput" placeholder="元号" style="flex: 1.2;">
                <input type="text" id="zodiacInput" placeholder="干支" style="flex: 1.2;">
                <input type="number" id="warekiInput" placeholder="年数" style="flex: 1;">
                <span>年</span>
            </div>
            <div id="sError" class="error-msg">※入力が正しくありません。</div>
            <div id="seirekiResult" class="result-wrapper">
                <div id="sText" class="result-text"></div>
                <div id="sDiff" class="result-diff"></div>
                <button id="sCopyBtn" class="copy-btn" onclick="copyFormatResult(this)">数値コピー</button>
            </div>
        </div>

        <div class="note">
            ※和暦や干支は漢字で入力してください。<br>
            ※和暦→西暦は「元号＋年数」または「元号＋干支」の入力で自動変換されます。<br>
            ※年の途中の改元は、その元号が始まった西暦年を起点としています。
        </div>

// 南朝独自の元号（変更なし）
const southEras = [
    { name: "元中", start: 1384, end: 1392 }, { name: "弘和", start: 1381, end: 1384 }, { name: "天授", start: 1375, end: 1381 }, { name: "文中", start: 1372, end: 1375 },

];

// 干支の漢字と読み方を定義
const jikkan = ["庚", "辛", "壬", "癸", "甲", "乙", "丙", "丁", "戊", "己"];
const jikkanYomi = ["かのえ", "かのと", "みずのえ", "みずのと", "きのえ", "きのと", "ひのえ", "ひのと", "つちのえ", "つちのと"];
const junishi = ["申", "酉", "戌", "亥", "子", "丑", "寅", "卯", "辰", "巳", "午", "未"];
const junishiYomi = ["さる", "とり", "いぬ", "い", "ね", "うし", "とら", "う", "たつ", "み", "うま", "ひつじ"];

function toKanjiYear(num) {
    if (num === 1) return "元";
    const kanji = ["", "一", "二", "三", "四", "五", "六", "七", "八", "九"];
    if (num < 10) return kanji[num];
    const tens = Math.floor(num / 10);
    const ones = num % 10;
    return (tens === 1 ? "十" : kanji[tens] + "十") + kanji[ones];
}

window.onload = () => {
    document.getElementById('seirekiInput').value = currentYear;
    let currentEra = eras.find(e => currentYear >= e.start) || eras[0];
    document.getElementById('gengoInput').value = currentEra.name;
    document.getElementById('warekiInput').value = currentYear - currentEra.start + 1;

    convertToWareki();
    convertToSeirekiUnified();
};

document.getElementById('seirekiInput').addEventListener('input', convertToWareki);
document.getElementById('gengoInput').addEventListener('input', convertToSeirekiUnified);
document.getElementById('zodiacInput').addEventListener('input', convertToSeirekiUnified);
document.getElementById('warekiInput').addEventListener('input', convertToSeirekiUnified);

// 干支とその読み方を取得する関数
function getKanshi(year) {
    const jIndex = year % 10;
    const juIndex = year % 12;
    return { 
        kanji: `${jikkan[jIndex]}${junishi[juIndex]}`,
        yomi: `${jikkanYomi[jIndex]}${junishiYomi[juIndex]}`
    };
}

function getDiffText(targetYear) {
    const diff = currentYear - targetYear;
    if (diff === 0) return "今年";
    return diff > 0 ? `現在から ${diff} 年前` : `現在から ${Math.abs(diff)} 年後`;
}

// 1. 西暦 → 和暦
function convertToWareki() {
    const year = parseInt(document.getElementById('seirekiInput').value);
    const resultBox = document.getElementById('warekiResult');
    const errorBox = document.getElementById('wError');

    if (isNaN(year)) return hide(resultBox, errorBox);
    if (year < 645) {
        document.getElementById('wError').innerText = "※大化（645年）以前は未対応です。";
        return showError(resultBox, errorBox);
    }
    
    let isBlank = false;
    if ((year >= 655 && year <= 685) || (year >= 687 && year <= 700)) {
        isBlank = true;
    }

    let mainEraStr = "";
    let copyText = "";

    if (isBlank) {
        mainEraStr = "（元号なし）";
        copyText = `（${year}）年`;
    } else {
        let eraName = "", eraYear = 0;
        for (let i = 0; i < eras.length; i++) {
            if (year >= eras[i].start) {
                eraName = eras[i].name;
                eraYear = year - eras[i].start + 1;
                break;
            }
        }
        mainEraStr = eraYear === 1 ? `${eraName}元年` : `${eraName}${eraYear}年`;
        copyText = `${eraName}${toKanjiYear(eraYear)}（${year}）年`;
    }

    let southEraStr = "";
    if (year >= 1336 && year <= 1392) {
        for (let i = 0; i < southEras.length; i++) {
            if (year >= southEras[i].start) {
                let sYear = year - southEras[i].start + 1;
                southEraStr = sYear === 1 ? `${southEras[i].name}元年` : `${southEras[i].name}${sYear}年`;
                break;
            }
        }
    }

    let displayText = mainEraStr;
    if (southEraStr) {
        displayText = `北朝: ${mainEraStr}<br>南朝: ${southEraStr}`;
    }

    const kanshi = getKanshi(year);
    // 読み方（フリガナ）を追加表示
    document.getElementById('wText').innerHTML = `${displayText} ／ ${kanshi.kanji}（${kanshi.yomi}）`;
    document.getElementById('wDiff').innerText = getDiffText(year);
    document.getElementById('wCopyBtn').dataset.copyText = copyText;
    showResult(resultBox, errorBox);
}

// 2. 和暦・干支 → 西暦
function convertToSeirekiUnified() {
    const gengoName = document.getElementById('gengoInput').value.trim();
    const zodiacStr = document.getElementById('zodiacInput').value.trim();
    const yearNum = parseInt(document.getElementById('warekiInput').value);

    const resultBox = document.getElementById('seirekiResult');
    const errorBox = document.getElementById('sError');

    if (!gengoName) return hide(resultBox, errorBox);

    let targetEra = null;
    let startYear = 0;
    let endYear = 0;

    const eraIndex = eras.findIndex(era => era.name === gengoName);
    if (eraIndex !== -1) {
        targetEra = eras[eraIndex];
        startYear = targetEra.start;
        // 令和（現在の元号）以外は、次の元号の開始年を終了年とする
        endYear = eraIndex === 0 ? currentYear + 50 : eras[eraIndex - 1].start;
        
        if (gengoName === "朱鳥") endYear = 687;
        if (gengoName === "白雉") endYear = 655;
        if (gengoName === "大化") endYear = 650;
    } else {
        const sIndex = southEras.findIndex(era => era.name === gengoName);
        if (sIndex !== -1) {
            targetEra = southEras[sIndex];
            startYear = targetEra.start;
            endYear = targetEra.end;
        } else {
            document.getElementById('sError').innerText = "※元号が見つかりません。";
            return showError(resultBox, errorBox);
        }
    }

    let seireki = null;
    let eraYear = null;

    if (!isNaN(yearNum) && yearNum >= 1) {
        seireki = startYear + yearNum - 1;
        eraYear = yearNum;
        
        // ★修正ポイント: 入力された年が元号の終了年を超えていないかチェック
        if (seireki > endYear && eraIndex !== 0) {
            let maxYear = endYear - startYear + 1;
            document.getElementById('sError').innerText = `※${gengoName}は${maxYear}年までしかありません。`;
            return showError(resultBox, errorBox);
        }
        
        if (zodiacStr.length >= 2) {
            const actualZodiac = getKanshi(seireki).kanji;
            if (actualZodiac !== zodiacStr.substring(0, 2)) {
                document.getElementById('sError').innerText = `※不一致: ${gengoName}${yearNum}年は「${actualZodiac}」です。`;
                return showError(resultBox, errorBox);
            }
        }
    } else if (zodiacStr.length >= 2) {
        let foundYear = -1;
        for (let y = startYear; y <= endYear; y++) {
            if (getKanshi(y).kanji === zodiacStr.substring(0, 2)) {
                foundYear = y;
                break;
            }
        }
        
        if (foundYear === -1) {
            document.getElementById('sError').innerText = "※その元号の期間内に指定の干支は見つかりません。";
            return showError(resultBox, errorBox);
        }
        seireki = foundYear;
        eraYear = foundYear - startYear + 1;
    } else {
        return hide(resultBox, errorBox);
    }

    const kanshi = getKanshi(seireki);
    
    // 「元年」か「数字」かだけを判定して「年」はつけないでおく
    const yearNumStr = eraYear === 1 ? "元" : eraYear; 
    
    // ご希望のフォーマットに合体して、最後に「年」をつける！
    document.getElementById('sText').innerText = `${seireki}年 ／ ${targetEra.name}${yearNumStr} ${kanshi.kanji}（${kanshi.yomi}）年`;
    document.getElementById('sDiff').innerText = getDiffText(seireki);
    document.getElementById('sCopyBtn').dataset.copyText = `${targetEra.name}${toKanjiYear(eraYear)}（${seireki}）年`;    
    showResult(resultBox, errorBox);
}

function hide(resultBox, errorBox) {
    resultBox.style.display = 'none';
    errorBox.style.display = 'none';
}

function showError(resultBox, errorBox) {
    resultBox.style.display = 'none';
    errorBox.style.display = 'block';
}

function showResult(resultBox, errorBox) {
    errorBox.style.display = 'none';
    resultBox.style.display = 'block';
}

function copyFormatResult(btnElement) {
    navigator.clipboard.writeText(btnElement.dataset.copyText).then(() => {
        const originalHTML = btnElement.innerHTML;
        btnElement.innerHTML = "✓ コピー完了";
        btnElement.style.backgroundColor = "var(--accent)";
        btnElement.style.color = "#fff";
        setTimeout(() => {
            btnElement.innerHTML = originalHTML;
            btnElement.style.backgroundColor = "";
            btnElement.style.color = "";
        }, 2000);
    });
}

        window.addEventListener('load', function() {
          navigator.serviceWorker.register('./sw.js').catch(function(err) {
            console.log('ServiceWorker error: ', err);
          });
        });
      }
    </script>
